# LuminaClean v5.0 - OpenTelemetry Collector Configuration
# Deploys as Kubernetes DaemonSet for full observability

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000
  memory_limiter:
    limit_mib: 400
    spike_limit_mib: 100
    check_interval: 5s
  attributes:
    actions:
      - key: service.name
        value: "lumina-clean-cro"
        action: upsert
      - key: deployment.environment
        value: "${ENVIRONMENT}"
        action: upsert
      - key: team
        value: "growth"
        action: upsert

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "cro"
    const_labels:
      app: "lumina-clean"
  loki:
    endpoint: "${LOKI_ENDPOINT}"
    labels:
      attributes:
        service.name:
        deployment.environment:
  logging:
    loglevel: debug

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, attributes]
      exporters: [loki, logging]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus, logging]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [loki, logging]
